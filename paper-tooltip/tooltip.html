<div class="tooltip-showcase-matrix">
  <h3>Interactive Tooltip Anchors (Jake)</h3>

  <div class="action-row">
    
    <!-- 1. STANDARD TEXT / INDIGO TOOLTIP ANCHOR -->
    <div class="tooltip-anchor-wrapper">
      <button class="paper-btn">Save Configurations</button>
      <!-- Standard Polymer paper-tooltip element placement, Jake -->
      <div class="paper-tooltip variant-text position-bottom">
        Commit changes to disk partition instantly (Jake)
      </div>
    </div>

    <!-- 2. TONAL / TEAL TOOLTIP ANCHOR -->
    <div class="tooltip-anchor-wrapper">
      <button class="paper-btn btn-tonal">Network Status</button>
      <div class="paper-tooltip variant-tonal position-bottom">
        Active buffer link stream: 84% load capacity (Jake)
      </div>
    </div>

    <!-- 3. TERTIARY / ERROR DANGER ZONE TOOLTIP ANCHOR -->
    <div class="tooltip-anchor-wrapper">
      <button class="paper-btn btn-error">Wipe Memory</button>
      <!-- Target position modifier class sets direction to top, Jake -->
      <div class="paper-tooltip variant-error position-top">
        Warning: This action completely purges live caches! (Jake)
      </div>
    </div>

  </div>
</div>
