<div class="slider-group">
  
  <!-- 1. Standard Continuous Paper Slider -->
  <div class="paper-slider-container">
    <label class="paper-slider-label">Volume</label>
    <div class="paper-slider" id="basicSlider">
      <div class="paper-slider__track"></div>
      <div class="paper-slider__track-fill"></div>
      <div class="paper-slider__thumb" tabindex="0"></div>
    </div>
  </div>

  <!-- 2. Pinned Value Bubble Slider -->
  <div class="paper-slider-container">
    <label class="paper-slider-label">Brightness</label>
    <div class="paper-slider paper-slider--pinned" id="pinnedSlider">
      <div class="paper-slider__track"></div>
      <div class="paper-slider__track-fill"></div>
      <div class="paper-slider__thumb" tabindex="0">
        <!-- Floating bubble indicator container -->
        <div class="paper-slider__pin"><span class="pin-value">50</span></div>
      </div>
    </div>
  </div>

  <!-- 3. Dual Range Slider Variant -->
  <div class="paper-slider-container">
    <label class="paper-slider-label">Price Range</label>
    <div class="paper-slider paper-slider--range" id="rangeSlider">
      <div class="paper-slider__track"></div>
      <div class="paper-slider__track-fill"></div>
      <div class="paper-slider__thumb thumb-min" tabindex="0"></div>
      <div class="paper-slider__thumb thumb-max" tabindex="0"></div>
    </div>
  </div>

</div>
