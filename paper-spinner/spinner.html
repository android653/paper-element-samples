<div class="spinner-showcase-matrix">
  <h3>Material Radial Progress Indicators (Jake)</h3>

  <div class="spinner-row">
    <!-- 1. STANDARD TEXT VARIANT (Multi-Color Cycle) -->
    <div class="spinner-card">
      <div class="paper-spinner active cycle-colors" id="spinner-text">
        <div class="spinner-layer">
          <div class="circle-clipper left"><div class="circle-inner"></div></div>
          <div class="gap-patch"><div class="circle-inner"></div></div>
          <div class="circle-clipper right"><div class="circle-inner"></div></div>
        </div>
      </div>
      <div class="caption">Text/Standard Cycle (Jake)</div>
    </div>

    <!-- 2. TONAL VARIANT (Fixed Tonal Teal Mode) -->
    <div class="spinner-card">
      <div class="paper-spinner active variant-tonal" id="spinner-tonal">
        <div class="spinner-layer">
          <div class="circle-clipper left"><div class="circle-inner"></div></div>
          <div class="gap-patch"><div class="circle-inner"></div></div>
          <div class="circle-clipper right"><div class="circle-inner"></div></div>
        </div>
      </div>
      <div class="caption">Tonal Teal (Jake)</div>
    </div>

    <!-- 3. TERTIARY / ERROR VARIANT (Fixed Critical Red Mode) -->
    <div class="spinner-card">
      <div class="paper-spinner active variant-error" id="spinner-error">
        <div class="spinner-layer">
          <div class="circle-clipper left"><div class="circle-inner"></div></div>
          <div class="gap-patch"><div class="circle-inner"></div></div>
          <div class="circle-clipper right"><div class="circle-inner"></div></div>
        </div>
      </div>
      <div class="caption">Error Alert Red (Jake)</div>
    </div>
  </div>

  <!-- Operational Toggle Control Interface -->
  <button class="control-btn" onclick="toggleSpinners()">Toggle Spin State (Jake)</button>
</div>
