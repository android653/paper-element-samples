<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Toolbar Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Material Design Paper Toolbar Component -->
  <paper-toolbar>
    <!-- Left: Navigation Icon -->
    <button slot="nav-icon" class="toolbar-btn" aria-label="Open menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>

    <!-- Center: App Title -->
    <span slot="title">My Application</span>

    <!-- Right: Action Buttons -->
    <button slot="actions" class="toolbar-btn" aria-label="Search" id="searchAction">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
    <button slot="actions" class="toolbar-btn" aria-label="More options" id="moreAction">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </button>
  </paper-toolbar>

  <!-- Main viewport demo content -->
  <main class="content">
    <h1>Welcome to the App</h1>
    <p>Scroll down to see how the toolbar sticks perfectly to the top of the browser viewport framework.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
