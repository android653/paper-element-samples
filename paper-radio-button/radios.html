<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Polymer Radio Variant Matrix for Jake</title>
  <script type="module" src="paper-radio.js"></script>
  <style>
    body {
      font-family: Roboto, system-ui, sans-serif;
      padding: 40px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .matrix-card {
      background: #ffffff;
      padding: 24px;
      border-radius: 4px;
      box-shadow: 0 2px 2px rgba(0,0,0,0.05);
      max-width: 400px;
    }

    h3 { margin: 0 0 16px 0; font-size: 14px; color: #212121; text-transform: uppercase; }

    /* --- Theme Token Configuration Sets, Jake --- */
    .variant-text {
      --paper-radio-border-color: #757575;
      --paper-radio-active-color: #3f51b5; /* Paper Indigo */
      --paper-radio-ripple-color: rgba(63, 81, 181, 0.12);
    }

    .variant-tonal {
      --paper-radio-border-color: #004d40;
      --paper-radio-active-color: #009688; /* Paper Teal */
      --paper-radio-ripple-color: rgba(0, 150, 136, 0.12);
    }

    .variant-error {
      --paper-radio-border-color: #b71c1c;
      --paper-radio-active-color: #db4437; /* Paper Red Alert */
      --paper-radio-ripple-color: rgba(219, 68, 55, 0.15);
    }
  </style>
</head>
<body>

  <!-- 1. TEXT THEME MATRIX -->
  <div class="matrix-card">
    <h3>Indigo Option Profile Stack (Jake)</h3>
    <paper-radio-group class="variant-text" id="groupText">
      <paper-radio-button value="opt1" checked>Default Preference Mapping</paper-radio-button>
      <paper-radio-button value="opt2">Secondary Partition Cache</paper-radio-button>
    </paper-radio-group>
  </div>

  <!-- 2. TONAL THEME MATRIX -->
  <div class="matrix-card">
    <h3>Teal Analytics Clusters (Jake)</h3>
    <paper-radio-group class="variant-tonal" id="groupTonal">
      <paper-radio-button value="tonal1" checked>Optimize Pipeline Latency</paper-radio-button>
      <paper-radio-button value="tonal2">Expand Shard Redundancy</paper-radio-button>
    </paper-radio-group>
  </div>

  <!-- 3. TERTIARY / ERROR THEME MATRIX -->
  <div class="matrix-card">
    <h3>System Security Directives (Jake)</h3>
    <paper-radio-group class="variant-error" id="groupError">
      <paper-radio-button value="err1">Retain Sector Indexing</paper-radio-button>
      <paper-radio-button value="err2" checked>Force Wipe Cache Storage</paper-radio-button>
      <paper-radio-button value="err3" disabled>Lock Hardware Partition</paper-radio-button>
    </paper-radio-group>
  </div>

  <script>
    // Listen for selection variations in real time, Jake
    document.addEventListener('paper-radio-group-changed', (e) => {
      console.log('Jake, the active radio value selection changed to state target:', e.detail.value);
    });
  </script>

</body>
</html>
