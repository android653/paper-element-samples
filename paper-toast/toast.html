<!-- Trigger Buttons -->
<div class="button-group">
  <button id="showSimpleToast" class="paper-btn raised">Simple Toast</button>
  <button id="showActionToast" class="paper-btn raised colored">Action Toast</button>
</div>

<!-- Core Paper Toast Component Wrapper -->
<div id="paperToast" class="paper-toast" role="alert" aria-live="assertive">
  <span class="paper-toast__text" id="toastText">Notification text goes here</span>
  <!-- Optional action button wrapper inside the toast -->
  <button id="toastActionBtn" class="paper-btn text paper-toast__action">Undo</button>
</div>
