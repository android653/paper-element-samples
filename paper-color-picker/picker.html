<div class="paper-color-picker">
  <!-- Clickable color circle button -->
  <button class="picker-trigger" id="pickerTrigger" aria-label="Choose color">
    <span class="inner-circle" id="currentPreview"></span>
  </button>

  <!-- The popup swatch menu grid -->
  <div class="swatch-menu" id="swatchMenu">
    <div class="swatch-grid">
      <button class="swatch" style="background-color: #f44336;" data-color="#f44336" title="Red"></button>
      <button class="swatch" style="background-color: #e91e63;" data-color="#e91e63" title="Pink"></button>
      <button class="swatch" style="background-color: #9c27b0;" data-color="#9c27b0" title="Purple"></button>
      <button class="swatch" style="background-color: #673ab7;" data-color="#673ab7" title="Deep Purple"></button>
      <button class="swatch" style="background-color: #3f51b5;" data-color="#3f51b5" title="Indigo"></button>
      <button class="swatch" style="background-color: #2196f3;" data-color="#2196f3" title="Blue"></button>
      <button class="swatch" style="background-color: #03a9f4;" data-color="#03a9f4" title="Light Blue"></button>
      <button class="swatch" style="background-color: #00bcd4;" data-color="#00bcd4" title="Cyan"></button>
      <button class="swatch" style="background-color: #009688;" data-color="#009688" title="Teal"></button>
      <button class="swatch" style="background-color: #4caf50;" data-color="#4caf50" title="Green"></button>
      <button class="swatch" style="background-color: #8bc34a;" data-color="#8bc34a" title="Light Green"></button>
      <button class="swatch" style="background-color: #cddc39;" data-color="#cddc39" title="Lime"></button>
      <button class="swatch" style="background-color: #ffeb3b;" data-color="#ffeb3b" title="Yellow"></button>
      <button class="swatch" style="background-color: #ffc107;" data-color="#ffc107" title="Amber"></button>
      <button class="swatch" style="background-color: #ff9800;" data-color="#ff9800" title="Orange"></button>
      <button class="swatch" style="background-color: #ff5722;" data-color="#ff5722" title="Deep Orange"></button>
    </div>
  </div>
</div>
