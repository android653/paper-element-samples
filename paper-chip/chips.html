<div class="chip-group">
  <!-- 1. Simple Text Chip -->
  <div class="paper-chip">
    <span class="paper-chip__label">Simple Text</span>
  </div>

  <!-- 2. Action Chip with Leading Icon -->
  <div class="paper-chip paper-chip--action">
    <span class="paper-chip__icon">⚡</span>
    <span class="paper-chip__label">Action Trigger</span>
  </div>

  <!-- 3. Avatar Chip -->
  <div class="paper-chip">
    <span class="paper-chip__avatar">J</span>
    <span class="paper-chip__label">John Doe</span>
  </div>

  <!-- 4. Selectable Filter Chip (Starts Unchecked) -->
  <div class="paper-chip paper-chip--filterable" tabindex="0">
    <span class="paper-chip__checkmark">✓</span>
    <span class="paper-chip__label">Filter Active</span>
  </div>

  <!-- 5. Error Variant Chip -->
  <div class="paper-chip paper-chip--error">
    <span class="paper-chip__label">Invalid Status</span>
  </div>
</div>
