<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paper Segmented Button Demo</title>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f5f5f5;
      padding: 40px;
    }
  </style>
</head>
<body>

  <h3>Single-Select Group</h3>
  <!-- Wrap individual paper-segmented-buttons into a unified group container -->
  <div class="paper-segmented-group" id="viewMode">
    <paper-segmented-button value="day" checked>Day</paper-segmented-button>
    <paper-segmented-button value="week">Week</paper-segmented-button>
    <paper-segmented-button value="month">Month</paper-segmented-button>
  </div>

  <script>
    // --- Define the Custom Web Component ---
    class PaperSegmentedButton extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
      }

      // Track the checked attribute for dynamic style rendering
      static get observedAttributes() {
        return ['checked', 'disabled'];
      }

      connectedCallback() {
        this.render();
        this.addEventListener('click', this._onClick.bind(this));
      }

      attributeChangedCallback() {
        this.render();
      }

      get checked() { return this.hasAttribute('checked'); }
      set checked(val) { val ? this.setAttribute('checked', '') : this.removeAttribute('checked'); }
      get value() { return this.getAttribute('value') || ''; }

      _onClick() {
        if (this.hasAttribute('disabled')) return;
        
        // Handle single-select mutual exclusivity inside a parent group container
        const parent = this.parentElement;
        if (parent && parent.classList.contains('paper-segmented-group')) {
          const siblings = parent.querySelectorAll('paper-segmented-button');
          siblings.forEach(el => el.checked = false);
        }
        
        this.checked = true;

        // Dispatch a bubbling event to let developers listen for changes
        this.dispatchEvent(new CustomEvent('change', {
          bubbles: true,
          detail: { value: this.value }
        }));
      }

      render() {
        this.shadowRoot.innerHTML = `
          <style>
            :host {
              display: inline-flex;
              flex: 1;
            }
            .button {
              display: inline-flex;
              align-items: center;
              justify-content: center;
              width: 100%;
              min-height: 40px;
              padding: 10px 24px;
              font-size: 14px;
              font-weight: 500;
              letter-spacing: 0.1px;
              cursor: pointer;
              background-color: #ffffff;
              color: #49454f;
              border: 1px solid #79747e;
              border-right: none; /* Avoid double borders between elements */
              position: relative;
              overflow: hidden;
              user-select: none;
              transition: background-color 0.2s, color 0.2s;
            }
            /* Style first and last elements in a group container */
            :host(:first-of-type) .button {
              border-radius: 20px 0 0 20px;
            }
            :host(:last-of-type) .button {
              border-radius: 0 20px 20px 0;
              border-right: 1px solid #79747e;
            }
            /* Material Design 3 Selected State Styles */
            :host([checked]) .button {
              background-color: #e8def8;
              color: #1d192b;
            }
            /* Simple ripple overlay simulation on hover */
            .button:hover {
              background-color: #f4effa;
            }
            :host([checked]) .button:hover {
              background-color: #dfd5f0;
            }
            :host([disabled]) .button {
              opacity: 0.38;
              cursor: not-allowed;
            }
          </style>
          <div class="button">
            <slot></slot>
          </div>
        `;
      }
    }

    // Register the web component definition with the browser window
    customElements.define('paper-segmented-button', PaperSegmentedButton);

    // --- JavaScript Event Listener Usage Example ---
    const viewGroup = document.getElementById('viewMode');
    viewGroup.addEventListener('change', (event) => {
      console.log('Selected view state:', event.detail.value);
    });
  </script>

  <style>
    /* External layout styles to bind buttons into a rigid layout bar */
    .paper-segmented-group {
      display: inline-flex;
      width: 100%;
      max-width: 400px;
    }
  </style>

</body>
</html>
