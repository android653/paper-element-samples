<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Classic Paper Buttons</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="button-group">
    <!-- Filled Button (Solid color background, no elevation shadow) -->
    <button class="paper-btn filled">Filled</button>

    <!-- Flat Button (Neutral background container, no elevation shadow) -->
    <button class="paper-btn flat">Flat</button>
    
    <!-- Text Button (Completely transparent wrapper, text only) -->
    <button class="paper-btn text">Text</button>
    
    <!-- Raised Button (Traditional light gray/white background with elevation) -->
    <button class="paper-btn raised">Raised</button>
    
    <!-- Colored Raised Button (Theme color background with elevation) -->
    <button class="paper-btn raised colored">Colored</button>
    
    <!-- Outlined Button (Transparent background with strict border wrapper) -->
    <button class="paper-btn outlined">Outlined</button>
    
    <!-- Error / Danger Button (Red background with elevation) -->
    <button class="paper-btn raised error">Error</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
